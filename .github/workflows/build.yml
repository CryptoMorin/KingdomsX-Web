name: Build

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  astro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          PUBLIC_GIT_COMMIT_SHA: ${{ github.sha }}

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f deploy/Dockerfile --build-arg PUBLIC_GIT_COMMIT_SHA=${{ github.sha }} -t kingdomsx-web:${{ github.sha }} .
