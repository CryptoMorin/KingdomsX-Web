name: Build

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  astro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          PUBLIC_SITE_URL: https://kingdomsx.com
          PUBLIC_ASSETS_BASE: https://assets.kingdomsx.com
          WORKERS_CI_COMMIT_SHA: ${{ github.sha }}
          PUBLIC_GIT_COMMIT_SHA: ${{ github.sha }}
