name: Build

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  astro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          PUBLIC_GIT_COMMIT_SHA: ${{ github.sha }}

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: >-
          docker build
          -f deploy/Dockerfile
          --build-arg PUBLIC_SITE_URL=https://kingdomsx.com
          --build-arg PUBLIC_ASSETS_BASE=https://assets.kingdomsx.com
          --build-arg PUBLIC_GIT_COMMIT_SHA=${{ github.sha }}
          -t kingdomsx-web:${{ github.sha }}
          .
